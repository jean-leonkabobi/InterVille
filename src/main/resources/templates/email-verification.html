<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Vérification email</title>
</head>
<body style="font-family: Arial, sans-serif;">
<div style="max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2 style="color: #2c3e50;">Bienvenue sur <span th:text="${companyName}">Transport RDC</span></h2>
    <p>Merci de vous être inscrit ! Veuillez vérifier votre adresse email en cliquant sur le lien ci-dessous :</p>
    <a th:href="${verificationUrl}" style="display: inline-block; padding: 10px 20px; background-color: #3498db; color: white; text-decoration: none; border-radius: 5px;">Vérifier mon email</a>
    <p style="margin-top: 20px; color: #7f8c8d; font-size: 12px;">Si vous n'avez pas créé de compte, ignorez cet email.</p>
</div>
</body>
</html>
